services:
  - type: web
    name: retrovision
    runtime: static
    region: singapore
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/retro-vision run build
    staticPublishPath: artifacts/retro-vision/dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
